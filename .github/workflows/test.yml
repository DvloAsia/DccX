name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup environment
        run: |
          sudo apt update
          sudo apt install gcc make -y
          
      - name: Build project
        run: |
          make
          
      - name: Run tests
        run: |
          ./dccx test/test_lexer.dvx
          
      - name: Run AI tests
        run: |
          ./dccx test/test_ai.dvx