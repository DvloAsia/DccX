<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DccX 网站访问测试</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding: 30px;
            background-color: #f8fafc;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .success-box {
            background-color: #3498db;
            color: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .link-box {
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }
        
        h1 {
            color: #3498db;
            margin-bottom: 20px;
        }
        
        h2 {
            color: #2c3e50;
            margin-bottom: 15px;
        }
        
        .url-button {
            background-color: #3498db;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            transition: all 0.3s ease;
        }
        
        .url-button:hover {
            background-color: #2c3e50;
            transform: translateY(-3px);
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .feature {
            background-color: #f0f8ff;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #3498db;
        }
        
        .feature h3 {
            color: #3498db;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-box">
            <h1>✅ DccX 双语网站上传成功！</h1>
            <p>网站已部署到 GitHub Pages，可以立即访问。</p>
        </div>
        
        <div class="link-box">
            <h2>访问链接</h2>
            
            <h3>主要链接</h3>
            <a href="https://dvloasia.github.io/DccXWeb/" class="url-button">主网站 - 语言选择</a>
            
            <h3>语言版本</h3>
            <a href="https://dvloasia.github.io/DccXWeb/zh/" class="url-button">中文版网站</a>
            <a href="https://dvloasia.github.io/DccXWeb/en/" class="url-button">英文版网站</a>
            
            <h3>GitHub 仓库</h3>
            <a href="https://github.com/DvloAsia/DccXWeb" class="url-button">GitHub 代码仓库</a>
        </div>
        
        <div class="link-box">
            <h2>网站功能特点</h2>
            <div class="features">
                <div class="feature">
                    <h3>双语支持</h3>
                    <p>中文和英文两种语言版本</p>
                </div>
                <div class="feature">
                    <h3>响应式设计</h3>
                    <p>适配手机、平板、电脑</p>
                </div>
                <div class="feature">
                    <h3>现代化 UI</h3>
                    <p>卡片布局，渐变色彩</p>
                </div>
                <div class="feature">
                    <h3>简化域名</h3>
                    <p>更短更简洁的网址</p>
                </div>
            </div>
        </div>
        
        <div class="link-box">
            <h2>测试指南</h2>
            <p>1. 点击上面的链接测试网站</p>
            <p>2. 测试语言切换功能</p>
            <p>3. 测试不同设备显示效果</p>
            <p>4. 测试页面导航和加载</p>
        </div>
    </div>
    
    <script>
        document.querySelectorAll('.url-button').forEach(btn => {
            btn.addEventListener('click', function() {
                const url = this.textContent.includes('GitHub') ? 
                    'https://github.com/DvloAsia/DccXWeb' : this.textContent;
                
                window.open(this.href || url, '_blank');
            });
        });
    </script>
</body>
</html>
